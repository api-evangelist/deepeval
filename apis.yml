aid: deepeval
name: DeepEval
description: >-
  DeepEval is an open-source LLM evaluation framework — built and maintained by
  Confident AI — for testing and benchmarking large language model
  applications. It is structured like Pytest but specialized for LLM systems,
  providing 40+ research-backed metrics (G-Eval, DAG, RAG metrics, agent
  metrics, multi-turn conversation metrics, multimodal metrics, MCP metrics,
  hallucination, bias, toxicity, summarization, JSON correctness) that run
  locally against any LLM provider (OpenAI, Anthropic, Gemini, Bedrock, Vertex
  AI, Ollama, OpenRouter, vLLM, LM Studio, LiteLLM, Azure OpenAI, DeepSeek,
  Grok, Moonshot, Portkey). DeepEval supports end-to-end and component-level
  evaluation via the `@observe()` decorator, synthetic dataset generation,
  multi-turn conversation simulation, CI/CD integration, automatic prompt
  optimization, and one-line LLM benchmarking (MMLU, HellaSwag, DROP,
  BIG-Bench Hard, TruthfulQA, HumanEval, GSM8K). DeepEval ships as the
  `deepeval` Python package on PyPI together with a `deepeval` command-line
  tool. The framework integrates natively with pytest, LangChain, LangGraph,
  LlamaIndex, OpenAI Agents, CrewAI, Pydantic AI, AWS AgentCore, Google ADK,
  and Strands. DeepEval is open source under Apache 2.0 and is the engine that
  powers Confident AI's commercial LLM evaluation, observability, and
  red-teaming platform; `deepeval login` connects local test runs to the
  Confident AI cloud for shared regression reports, dataset management,
  production tracing, and prompt versioning. A sibling open-source framework,
  DeepTeam (`deepteam`), targets adversarial / red-team testing of LLM apps.
